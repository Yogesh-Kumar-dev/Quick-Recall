name: Deploy to EC2

# Separate from Vercel: Vercel deploys quickrecall.vercel.app automatically via its own git
# integration and is untouched by this workflow. This pipeline only pushes to the EC2 practice
# deployment (quickrecall-aws.duckdns.org).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-ec2
  cancel-in-progress: false # never cancel a deploy mid-rsync

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint & format (Biome)
        run: pnpm lint:ci
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

      - name: Dead-code check (Knip)
        run: pnpm knip
        continue-on-error: true

      - name: Test
        run: pnpm test

  deploy:
    name: Deploy
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/setup

      - run: pnpm build

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust the EC2 host key
        run: ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # Ship whole tree (src/ needed too: machine-coding pages readFileSync their own source
      # at render time). Exclude pattern must be /node_modules (leading slash, anchored to
      # root) — unanchored 'node_modules' also strips .next/node_modules, which holds Sentry's
      # require-in-the-middle-<hash> alias needed at runtime. That was the real 500 crash cause.
      - name: rsync build output + source to EC2
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='/node_modules' \
            --exclude='.github' \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/quickrecall/"

      # Full install (not --prod): matches CI's exact dependency tree. CI=true skips pnpm's
      # interactive purge prompt (no TTY over SSH). startOrReload not reload: plain reload
      # no-ops on a PM2 process stuck "errored" from a past crash-looped deploy.
      - name: Install deps + reload PM2
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd /opt/quickrecall
            CI=true pnpm install --frozen-lockfile
            pm2 startOrReload deploy/ecosystem.config.cjs
          '

      - name: Health check
        run: |
          sleep 3
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'curl -fsS -o /dev/null -w "quickrecall responded %{http_code}\n" http://127.0.0.1:3000'
