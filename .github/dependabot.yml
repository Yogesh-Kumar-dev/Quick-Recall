version: 2
updates:
  # Application dependencies (pnpm is handled by the npm ecosystem).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Group routine minor/patch bumps into a single PR to cut noise; majors stay separate.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in workflows current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
