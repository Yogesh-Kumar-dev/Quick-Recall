# QuickRecall nginx site config — canonical copy lives in the repo (deploy/nginx.conf).
# On the server it is symlinked into /etc/nginx/sites-enabled/ (see deploy/README.md),
# so a `git pull` + `nginx -t && systemctl reload nginx` ships config changes.
#
# HTTPS: run `certbot --nginx` after pointing a domain here — certbot edits the file in
# place on the server; port those edits back into this repo copy to keep it canonical.

server {
  listen 80;
  listen [::]:80;
  server_name quickrecall-aws.duckdns.org; # swap for whatever subdomain you claimed on duckdns.org

  # Everything is served by the Next.js server on :3000. Next itself sets the right
  # Cache-Control headers (immutable for /_next/static, revalidation for the service
  # worker at /serwist/sw.js), so no per-location caching rules are needed here.
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Compress text responses (Next compresses HTML/RSC itself; this covers the rest,
  # notably the ~few-MB pdfium.wasm served from /public).
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/wasm;
  gzip_min_length 1024;
}
