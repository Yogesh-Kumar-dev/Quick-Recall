allowBuilds:
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true

# Sentry's Node auto-instrumentation (require-in-the-middle / import-in-the-middle) patches
# modules by walking node_modules at the top level. pnpm's default layout nests packages under
# .pnpm/ instead of hoisting them, so Turbopack's externalRequire can't find them at runtime —
# "Cannot find module 'require-in-the-middle-<hash>'" crashing next start on every request.
# Documented fix (same across every Sentry framework guide): force-hoist just these two.
# https://github.com/getsentry/sentry-javascript/issues/15209
publicHoistPattern:
  - '*require-in-the-middle*'
  - '*import-in-the-middle*'

# Collapse React to one version so every @leafygreen-ui/emotion resolves to a single instance
# (otherwise legacy's React 19.1.0 splits emotion into two caches and breaks SSR style flushing).
overrides:
  react: 19.2.4
  react-dom: 19.2.4
  "@types/react": 19.2.17
  # Collapse zod to one copy. Otherwise @hookform/resolvers resolves its `zod` peer to the
  # v3.25 copy (pulled by @modelcontextprotocol/sdk tooling), whose `zod/v4` preview brands as
  # minor 0 and clashes with our zod 4.4 schemas. Every consumer accepts ^4, so this is safe.
  zod: 4.4.3
